
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>Dashboard DGPC 2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-tap-highlight-color: transparent;
        }

        .farsi-bold {
            font-family: 'Cairo', sans-serif;
            font-weight: 900;
        }

        /* --- LUXURY 2025 STYLES (now primarily for PIN entry) --- */
        .luxury-bg {
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            position: relative;
            overflow: hidden;
        }

        .luxury-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            opacity: 0.5;
            z-index: 0;
        }

        .gold-text {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .gold-border {
            border: 1px solid transparent;
            background: linear-gradient(#020617, #020617) padding-box,
                        linear-gradient(135deg, #bf953f, #fcf6ba, #aa771c) border-box;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Removed .animate-float and @keyframes float as it was tied to the old splash image */

        /* --- END LUXURY STYLES --- */

        #zoom-wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: auto;
        }

        #zoom-container {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top center;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 100%;
        }

        /* Removed .prestige-loader, .logo-glow, @keyframes pulse-glow as they were tied to the old splash screen */

        /* STRICT A4 PORTRAIT MODE FOR PDF CAPTURE */
        .portrait-capture-mode {
            position: fixed !important;
            left: -10000px !important;
            top: 0 !important;
            width: 794px !important; /* A4 width @ 96 DPI */
            height: 1123px !important; /* A4 height @ 96 DPI */
            background-color: #ffffff !important;
            z-index: -1000;
            display: flex !important;
            flex-direction: column;
            justify-content: flex-start;
            padding: 40px !important;
            box-sizing: border-box !important;
            overflow: hidden !important;
        }
        
        .portrait-capture-mode * {
            box-sizing: border-box !important;
        }

        .no-export {
            display: block;
        }

        .portrait-capture-mode .no-export {
            display: none !important;
        }

        .status-dot {
            position: relative;
        }
        .status-dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 9999px;
            border: 2px solid currentColor;
            opacity: 0.3;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes ping {
            75%, 100% { transform: scale(2); opacity: 0; }
        }

        /* Custom spin animations for the loader */
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spin-fast {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); } /* Counter-clockwise for contrast */
        }
    </style>
